# Runtime settings consumed by src.pipeline_orchestrator.PipelineOrchestrator.
pipeline:
  name: YouTube Soccer Analyzer
  version: 0.1.0

youtube:
  video:
    # Requests may choose a smaller value but cannot exceed this ceiling.
    max_duration_seconds: 1800

processing:
  # Upper bound after request frame_rate and max_duration are applied.
  max_frames: 300

output:
  # ANALYSIS_OUTPUT_ROOT overrides this operationally; see .env.example.
  base_dir: outputs

analytics:
  # Tactical results require calibrated pitch coordinates. Keep disabled unless
  # a deployment supplies and verifies calibration for the input camera.
  enable_tactical: false
  calibration_path: ""
