stages:
  analyze_frames:
    cmd: >-
      python -m src.pipeline_full
      --frames-dir ${pipeline.frames_dir}
      --output-dir ${pipeline.output_dir}
      --weights ${pipeline.weights}
      --confidence ${pipeline.confidence}
      --min-confidence ${pipeline.min_confidence}
      --distance-threshold ${pipeline.distance_threshold}
      --max-age ${pipeline.max_age}
      --max-frames ${pipeline.max_frames}
      --graph-window ${pipeline.graph_window}
      --graph-distance-threshold ${pipeline.graph_distance_threshold}
    deps:
      - ${pipeline.frames_dir}
      - ${pipeline.weights}
      - src
    params:
      - pipeline.confidence
      - pipeline.distance_threshold
      - pipeline.frames_dir
      - pipeline.graph_distance_threshold
      - pipeline.graph_window
      - pipeline.max_age
      - pipeline.max_frames
      - pipeline.min_confidence
      - pipeline.output_dir
      - pipeline.weights
    outs:
      - ${pipeline.output_dir}
