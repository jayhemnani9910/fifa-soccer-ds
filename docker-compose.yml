name: fifa-soccer-ds

x-runtime-security: &runtime-security
  user: "10001:10001"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  init: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=256m
  networks:
    - backend

services:
  app:
    <<: *runtime-security
    build:
      context: .
      target: ${APP_BUILD_TARGET:-production}
    image: fifa-soccer-ds:app
    command:
      - python
      - -m
      - uvicorn
      - src.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
    environment:
      ANALYSIS_OUTPUT_ROOT: /app/outputs
      MPLCONFIGDIR: /tmp/matplotlib
      MLFLOW_TRACKING_URI: ${APP_MLFLOW_TRACKING_URI:-sqlite:////app/state/mlflow.db}
      PYTHONUNBUFFERED: "1"
      YOLO_CONFIG_DIR: /tmp
      YOLO_WEIGHTS: ${APP_YOLO_WEIGHTS:-/app/models/yolov8n.pt}
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - app_outputs:/app/outputs
      - app_state:/app/state
    restart: unless-stopped
    cpus: 2.0
    mem_limit: 4g
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  mlflow:
    <<: *runtime-security
    profiles: ["mlops"]
    build:
      context: .
      target: mlops
    image: fifa-soccer-ds:mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////app/state/mlflow.db
      - --artifacts-destination
      - /app/artifacts
      - --serve-artifacts
      - --workers
      - "2"
    ports:
      - "127.0.0.1:${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_artifacts:/app/artifacts
      - mlflow_state:/app/state
    cpus: 1.0
    mem_limit: 2g
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  dev:
    <<: *runtime-security
    profiles: ["dev"]
    build:
      context: .
      target: development
    image: fifa-soccer-ds:dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace
    env_file:
      - path: .env
        required: false
    command: ["bash"]
    stdin_open: true
    tty: true
    read_only: false
    tmpfs: []
    volumes:
      - .:/workspace
      - dev_cache:/tmp
    cpus: 2.0
    mem_limit: 4g

networks:
  backend:
    driver: bridge

volumes:
  app_outputs:
  app_state:
  dev_cache:
  mlflow_artifacts:
  mlflow_state:
