name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.9

      - name: Lint
        run: ruff check src tests

      - name: Check formatting
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          # Use CPU-only PyTorch for CI
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu
          # Install remaining deps, skipping GPU/problematic packages and comments
          grep -v -E '^(#|torch==|torchvision==|onnxruntime-gpu|openai-whisper|torch-geometric|librosa)' requirements.txt | grep -v '^\s*$' | pip install -r /dev/stdin
          pip install pytest pytest-cov

      - name: Run smoke tests
        run: pytest tests/test_detect_smoke.py tests/test_imports.py tests/test_track_stub.py tests/test_pipeline_full.py tests/test_gnn_inference.py -m smoke --tb=short -p no:cacheprovider
