name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install 'ruff>=0.3,<1.0'

      - name: Lint
        run: ruff check src tests

      - name: Check formatting
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          # Use CPU-only PyTorch for CI
          pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
          # Install remaining deps, skipping problematic packages
          pip install $(grep -v -E '^(torch==|torchvision==|onnxruntime-gpu|openai-whisper|torch-geometric|librosa)' requirements.txt | tr '\n' ' ')
          pip install pytest pytest-cov

      - name: Run smoke tests
        run: pytest -m smoke --tb=short
