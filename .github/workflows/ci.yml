name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU test environment
        run: |
          python -m pip install --upgrade "pip==26.1.2" "setuptools==83.0.0" "wheel==0.47.0"
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.13.0" "torchvision==0.28.0"
          python -m pip install -e ".[audio,data,dev,export,mlops]"
          python -m pip check

      - name: Lint and formatting
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Type check
        run: mypy src

      - name: Run aggregate pre-commit gate
        run: pre-commit run --all-files

      - name: Test with branch coverage
        run: pytest --cov=src --cov-branch --cov-report=term-missing --cov-report=xml

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate built metadata
        run: python -m pip install --dry-run --no-deps dist/*.whl

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install security environment
        run: |
          python -m pip install --upgrade "pip==26.1.2"
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.13.0" "torchvision==0.28.0"
          python -m pip install -e ".[audio,data,dev,export,mlops]" "pip-audit==2.10.1"
          python -m pip check

      - name: Static security scan
        run: bandit -c pyproject.toml -r src

      - name: Dependency vulnerability scan
        run: |
          pip-audit --local
          python -c 'from importlib.metadata import version; print("torch==" + version("torch").split("+", 1)[0]); print("torchvision==" + version("torchvision").split("+", 1)[0])' > /tmp/fifa-public-torch.txt
          pip-audit --requirement /tmp/fifa-public-torch.txt --no-deps --disable-pip

  configuration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Compose model
        run: |
          docker compose --profile dev --profile mlops config --quiet
          docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile mlops config --quiet

      - name: Validate Dockerfile
        run: docker build --check --target production .
