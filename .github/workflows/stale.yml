name: Stale Issues

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed
            in 7 days if there is no further activity. Add the `pinned`
            label to keep it open.
          stale-pr-message: >
            This PR has been inactive for 14 days and will be closed
            in 7 days if there is no further activity.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,in-progress,bug"
          exempt-pr-labels: "in-progress"
