version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pytorch:
        patterns:
          - "torch"
          - "torch-geometric"
          - "torchvision"
      api:
        patterns:
          - "fastapi"
          - "pydantic"
          - "slowapi"
          - "uvicorn"
      quality:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
