name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Detection (YOLOv8)
        - Tracking (ByteTrack)
        - Graph / GNN
        - API (FastAPI)
        - Live Streaming
        - YouTube Download
        - MLflow / DVC
        - Other
    validations:
      required: true
