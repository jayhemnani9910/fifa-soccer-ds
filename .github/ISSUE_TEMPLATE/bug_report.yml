name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `python -m src.pipeline_full ...`
        2. See error in ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste any relevant error output.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Detection (YOLOv8)
        - Tracking (ByteTrack)
        - Graph / GNN
        - API (FastAPI)
        - Live Streaming
        - YouTube Download
        - MLflow / DVC
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11"
