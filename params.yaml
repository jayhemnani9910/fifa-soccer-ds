pipeline:
  # These inputs must be supplied through DVC (or another provenance-controlled
  # store) before `dvc repro`; the repository intentionally ships neither media
  # nor model weights.
  frames_dir: data/processed/sample
  weights: models/yolov8n.pt
  output_dir: outputs/dvc-analysis
  confidence: 0.4
  min_confidence: 0.35
  distance_threshold: 120.0
  max_age: 20
  max_frames: 30
  graph_window: 30
  graph_distance_threshold: 80.0
