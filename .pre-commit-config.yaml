repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 2700fd5671c633760d912769c041bfcde2b9a01b  # v0.15.22
    hooks:
      - id: ruff-check
      - id: ruff-format
  # Type checking must see the project's installed runtime dependencies. An
  # isolated mirrors-mypy environment reports false import failures unless the
  # entire ML/CV stack is duplicated inside the hook environment.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        args: ["src"]
        pass_filenames: false
  - repo: https://github.com/pycqa/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src/"]
        pass_filenames: false
